# 生產環境覆蓋：移除 MinIO，改用 AWS S3
# 使用方式：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    restart: always
    environment:
      - USE_S3=true
      - MINIO_ENDPOINT=
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - sqlite_data:/app/data
    depends_on:
      minio:
        condition: service_completed_successfully
        required: false

  frontend:
    restart: always

  minio:
    image: alpine
    command: ["sh", "-c", "exit 0"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      retries: 1

volumes:
  sqlite_data:
